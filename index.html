<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITCR Open Exams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <p id="eyebrow" class="eyebrow"></p>
        <h1 id="title"></h1>
      </div>
    </header>

    <main class="main-content">
      <section id="content" class="content" aria-live="polite"></section>
    </main>

    <footer class="site-footer">
      <p>Instituto Tecnologico de Costa Rica - Open Exams Repository</p>
    </footer>

    <template id="subject-template">
      <article class="subject-card">
        <h2 class="subject-title"></h2>
        <div class="subject-body"></div>
      </article>
    </template>

    <template id="semester-template">
      <section class="semester-block">
        <h3 class="semester-title"></h3>
        <div class="semester-body"></div>
      </section>
    </template>

    <template id="parcial-template">
      <section class="parcial-block">
        <h4 class="parcial-title"></h4>
        <div class="parcial-body"></div>
      </section>
    </template>

    <template id="type-template">
      <section class="type-block">
        <h5 class="type-title"></h5>
        <ul class="file-list"></ul>
      </section>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
