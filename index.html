<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examenes Anteriores | ITCR</title>
  <meta name="description" content="Repositorio público para acceder y navegar exámenes anteriores del ITCR en formato PDF." />
  <meta name="theme-color" content="#002855" />

  <!-- Open Graph tags for WhatsApp, Instagram, and Discord -->
  <meta property="og:title" content="Exámenes Anteriores | ITCR" />
  <meta property="og:description" content="Repositorio público para acceder y navegar exámenes anteriores del ITCR en formato PDF." />
  <meta property="og:url" content="https://rgdan.github.io/examenes-anteriores-itcr/" />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="hero">
    <div class="hero-inner">
      <p id="eyebrow" class="eyebrow"></p>
      <h1 id="title"></h1>
    </div>
  </header>

  <div class="tabs-shell">
    <div class="tabs-utility" aria-hidden="true"></div>
    <div class="tabs-bar">
      <nav id="school-tabs" class="school-tabs" aria-label="Navegacion principal" role="tablist"></nav>
    </div>
  </div>

  <main class="main-content">
    <section id="content" class="content" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <p>
      Este sitio no utiliza ningun tipo de rastreo.<br />
      Este proyecto no tiene asociacion con el ITCR.<br />
      Si desea contribuir, visite
      <a href="https://github.com/rgdan/examenes-anteriores-itcr/" target="_blank" rel="noopener noreferrer">el repositorio</a>.
    </p>
  </footer>

  <template id="subject-template">
    <details class="subject-card">
      <summary class="subject-title"></summary>
      <div class="subject-body"></div>
    </details>
  </template>

  <template id="professor-template">
    <details class="professor-block">
      <summary class="professor-title"></summary>
      <div class="professor-body"></div>
    </details>
  </template>

  <template id="semester-template">
    <details class="semester-block">
      <summary class="semester-title"></summary>
      <div class="semester-body"></div>
    </details>
  </template>

  <template id="parcial-template">
    <details class="parcial-block">
      <summary class="parcial-title"></summary>
      <div class="parcial-body"></div>
    </details>
  </template>

  <template id="type-template">
    <section class="type-block exam-card">
      <h5 class="type-title"></h5>
      <div class="file-list"></div>
    </section>
  </template>

  <div id="pdf-viewer-modal" class="pdf-modal" aria-hidden="true" role="dialog" aria-labelledby="pdf-modal-title">
    <div class="pdf-modal-content">
      <header class="pdf-modal-header">
        <h3 id="pdf-modal-title" class="pdf-modal-title">Vista Previa</h3>
        <div class="pdf-modal-actions">
          <a id="pdf-modal-download" class="pdf-modal-btn download" href="" target="_blank" rel="noopener noreferrer" title="Abrir en pestaña nueva" aria-label="Abrir en pestaña nueva">
            <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            <span>Abrir en pestaña nueva</span>
          </a>
          <button id="pdf-modal-close" class="pdf-modal-btn close" aria-label="Cerrar modal" title="Cerrar">
            <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </header>
      <div class="pdf-modal-body">
        <div id="pdf-modal-loader" class="pdf-loader">
          <div class="spinner"></div>
          <p>Cargando PDF...</p>
        </div>
        <iframe id="pdf-modal-iframe" class="pdf-iframe" src="" title="Visualizador de PDF"></iframe>
      </div>
    </div>
  </div>

  <script type="module" src="js/loader.js"></script>
</body>

</html>
